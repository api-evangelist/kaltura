name: Kaltura Plans and Pricing
description: Kaltura offers enterprise video platform plans covering Media Services
  (VPaaS API), Video Portal, Virtual Events, Virtual Classroom, Webinars, and Town
  Halls. Pricing is quote-based and customized per organization size and usage. No
  self-serve public tiers are published; all plans require contacting sales.
url: https://corp.kaltura.com/pricing/
plans:
  - name: Media Services (VPaaS)
    description: API-first video platform plan for developers building custom video
      experiences. Includes VPaaS REST API access, transcoding, CDN delivery,
      player SDK, analytics, and storage. Pricing is custom based on bandwidth,
      storage, and transcoding volume.
    url: https://corp.kaltura.com/developer-suite/
    type: commercial
    features:
      - VPaaS REST API access
      - Media ingestion and upload
      - Transcoding and format conversion
      - CDN delivery and streaming
      - Kaltura Player SDK (web, iOS, Android)
      - Media analytics
      - Content access control and DRM
      - Live streaming
      - Bulk ingest
      - Metadata management
      - App tokens for production authentication
      - Client libraries (Python, PHP, Node.js, Java)

  - name: Video Portal
    description: Central hub for video creation, collaboration, and distribution
      within organizations. Includes media management console, channel management,
      search and discovery, and analytics.
    url: https://corp.kaltura.com/pricing/
    type: commercial
    features:
      - Video management console
      - Channel and category management
      - Search and discovery
      - User management
      - Analytics dashboard
      - SSO integration
      - Custom branding

  - name: Virtual Events
    description: All-in-one event management solution for hosting virtual and hybrid
      events with live streaming, on-demand replay, networking, and engagement tools.
    url: https://corp.kaltura.com/pricing/
    type: commercial
    features:
      - Live session broadcasting
      - On-demand replay
      - Multi-track scheduling
      - Attendee networking
      - Polls and Q&A
      - Sponsor management
      - Event analytics

  - name: Virtual Classroom
    description: Interactive online learning environment with live video, whiteboard,
      breakout rooms, quizzes, and LMS integrations for education use cases.
    url: https://corp.kaltura.com/pricing/
    type: commercial
    features:
      - Live video sessions
      - Interactive whiteboard
      - Breakout rooms
      - Quizzes and polls
      - LMS integration (Canvas, Moodle, Blackboard)
      - Session recording
      - Student analytics

  - name: Webinars
    description: Professional webinar platform with registration, live presentation,
      audience engagement tools, and post-event analytics.
    url: https://corp.kaltura.com/pricing/
    type: commercial
    features:
      - Registration and landing pages
      - Live presentation tools
      - Audience Q&A and polls
      - On-demand replay
      - Webinar analytics
      - CRM integration

  - name: Community Edition (Open Source)
    description: Free open-source self-hosted version of the Kaltura video platform.
      Suitable for developers and organizations wanting full control over their
      video infrastructure. No SLA or commercial support included.
    url: https://github.com/kaltura
    type: free
    features:
      - Full VPaaS API access
      - Self-hosted deployment
      - Transcoding engine
      - Player SDK
      - Media management
      - Community support only
