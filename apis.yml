aid: kaltura
name: Kaltura
description: Kaltura is an open-source video platform providing REST APIs for video
  management, live streaming, transcoding, player customization, analytics, and virtual
  classroom integrations. Developers can ingest, process, deliver, and monetize video
  content at scale across web, mobile, and OTT environments.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/kaltura/refs/heads/main/apis.yml
