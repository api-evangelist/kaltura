- aid: kaltura:ott-api
  name: Kaltura OTT Backend API
  description: The Kaltura OTT Backend API provides hundreds of REST-based endpoints
    giving programmable access to every OTT service including asset management, entitlements,
    subscriptions, live channels, EPG, and user management for over-the-top video
    delivery.
