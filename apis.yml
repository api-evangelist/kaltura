- aid: kaltura:vpaas-api
  name: Kaltura VPaaS API
  description: The Kaltura Video Platform as a Service (VPaaS) REST API enables developers
    to manage media assets, perform live streaming, transcode content, deliver video
    to players, collect analytics, and control access and security for video workflows.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
