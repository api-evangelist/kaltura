"""
Kaltura GraphQL Schema
Derived from Kaltura VPaaS REST API (https://developer.kaltura.com/api-docs/)
Covers media entries, playlists, categories, user management, video analytics,
live streaming, virtual classroom integrations, Kaltura sessions, and content moderation.
"""

scalar DateTime
scalar JSON
scalar Upload

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum MediaEntryStatus {
  IMPORT
  PRECONVERT
  READY
  DELETED
  PENDING
  MODERATE
  BLOCKED
  NO_CONTENT
}

enum MediaType {
  VIDEO
  IMAGE
  AUDIO
  LIVE_STREAM_FLASH
  LIVE_STREAM_WINDOWS_MEDIA
  LIVE_STREAM_REAL_MEDIA
  LIVE_STREAM_QUICKTIME
}

enum EntryModerationStatus {
  PENDING_MODERATION
  APPROVED
  REJECTED
  FLAGGED_FOR_REVIEW
  AUTO_APPROVED
}

enum FlavorAssetStatus {
  ERROR
  QUEUED
  CONVERTING
  READY
  DELETED
  NOT_APPLICABLE
  TEMP
  WAIT_FOR_CONVERT
  IMPORTING
  VALIDATING
  EXPORTING
}

enum AssetType {
  FLAVOR
  THUMBNAIL
  DOCUMENT
  VIDEO_CLIP
  WIDEVINE_FLAVOR
}

enum CategoryStatus {
  UPDATING
  ACTIVE
  DELETED
  PURGED
}

enum UserStatus {
  BLOCKED
  ACTIVE
  DELETED
}

enum UserRole {
  PUBLISHER_ADMIN_ROLE
  PUBLISHER_RESTRICTED_ROLE
  PARTNER_ONLY_ROLE
}

enum LiveStreamStatus {
  STOPPED
  PLAYBACK_ONLY
  BROADCASTING
}

enum PlaylistType {
  STATIC_LIST
  DYNAMIC
  EXTERNAL
}

enum CaptionType {
  SRT
  DFXP
  WEBVTT
  CAP
  SCC
}

enum TranscodingProfileStatus {
  DISABLED
  ENABLED
}

enum AccessControlScope {
  ENTRY_PLAYBACK_CONTEXT_SCOPE
  DOWNLOAD_SCOPE
  THUMBNAIL_SCOPE
  METADATA_SCOPE
  SEARCH_SCOPE
  EXPORT_SCOPE
}

enum ScheduledTaskStatus {
  DISABLED
  ACTIVE
  DELETED
  SUSPENDED
  IDLE
}

enum ConversionProfileType {
  MEDIA
  LIVE_STREAM
}

enum AnnotationType {
  ANNOTATION
  CODE_CUE_POINT
  AD_CUE_POINT
  DATA_CUE_POINT
  SCENE_CUE_POINT
  THUMB_CUE_POINT
  EVENT_CUE_POINT
  QUIZ_QUESTION
  CHAPTER
}

enum NotificationObjectType {
  ENTRY
  CATEGORY
  USER
  PARTNER
  BATCH_JOB
}

enum OrderDirection {
  ASC
  DESC
}

