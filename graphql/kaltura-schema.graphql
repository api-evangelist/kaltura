# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type Query {
  """Get a single media entry by ID."""
  mediaEntry(id: ID!): MediaEntry

  """List media entries with optional filtering and paging."""
  mediaEntries(filter: MediaEntryFilter, pager: PagerInput): MediaEntryListResponse!

  """Get a single category by ID."""
  category(id: ID!): Category

  """List categories."""
  categories(parentId: Int, freeText: String, pager: PagerInput): CategoryListResponse!

  """Get a single playlist by ID."""
  playlist(id: ID!): Playlist

  """List playlists."""
  playlists(freeText: String, pager: PagerInput): PlaylistListResponse!

  """Get a single user by ID."""
  user(id: ID!): KalturaUser

  """List users."""
  users(freeText: String, pager: PagerInput): UserListResponse!

  """Get a live stream entry by ID."""
  liveStreamEntry(id: ID!): LiveStreamEntry

  """Get flavor assets for an entry."""
  flavorAssets(entryId: String!, pager: PagerInput): FlavorAssetListResponse!

  """Get a single flavor asset."""
  flavorAsset(id: ID!): FlavorAsset

  """Get caption assets for an entry."""
  captionAssets(entryId: String!): [CaptionAsset]

  """Get thumbnail assets for an entry."""
  thumbnailAssets(entryId: String!): [ThumbnailAsset]

  """Get cue points for an entry."""
  cuePoints(entryId: String!, pager: PagerInput): CuePointListResponse!

  """Get an analytics report."""
  report(input: ReportInput!): Report

  """Get current partner info."""
  partner: Partner

  """List access control profiles."""
  accessControlProfiles(pager: PagerInput): [AccessControl]

  """Get a single access control profile."""
  accessControl(id: ID!): AccessControl

  """List conversion profiles."""
  conversionProfiles(pager: PagerInput): [ConversionProfile]

  """Get a single conversion profile."""
  conversionProfile(id: ID!): ConversionProfile

  """List flavor parameters."""
  flavorParams(pager: PagerInput): [FlavorParams]

  """List metadata profiles."""
  metadataProfiles(pager: PagerInput): [MetadataProfile]

  """Get metadata for an object."""
  metadata(objectId: String!, metadataProfileId: Int): [Metadata]

  """List storage profiles."""
  storageProfiles(pager: PagerInput): [StorageProfile]

  """List delivery profiles."""
  deliveryProfiles(pager: PagerInput): [DeliveryProfile]

  """List batch jobs."""
  batchJobs(jobType: String, status: Int, pager: PagerInput): BatchJobListResponse!

  """List moderation flags."""
  moderationFlags(entryId: String, pager: PagerInput): ModerationFlagListResponse!

  """List scheduled task profiles."""
  scheduledTaskProfiles(pager: PagerInput): [ScheduledTaskProfile]

  """List event notification templates."""
  eventNotificationTemplates(pager: PagerInput): [EventNotificationTemplate]

  """List user roles."""
  userRoles(pager: PagerInput): [UserRole]

  """List scheduled events."""
  scheduledEvents(entryId: String, pager: PagerInput): [ScheduledEvent]

  """List virtual classroom sessions."""
  virtualClassroomSessions(pager: PagerInput): [VirtualClassroomSession]

  """List document entries."""
  documentEntries(pager: PagerInput): [DocumentEntry]

  """Get bulk upload job."""
  bulkUpload(id: ID!): BulkUpload

  """List bulk upload jobs."""
  bulkUploads(pager: PagerInput): [BulkUpload]
}

type Mutation {
  """Start a new Kaltura Session."""
  startSession(input: StartSessionInput!): KalturaSession!

  """Create a new media entry."""
  createMediaEntry(entry: MediaEntryInput!): MediaEntry!

  """Update a media entry."""
  updateMediaEntry(id: ID!, entry: MediaEntryInput!): MediaEntry!

  """Delete a media entry."""
  deleteMediaEntry(id: ID!): Boolean!

  """Approve a media entry (moderation)."""
  approveEntry(id: ID!): MediaEntry!

  """Reject a media entry (moderation)."""
  rejectEntry(id: ID!): MediaEntry!

  """Flag a media entry for moderation."""
  flagEntry(input: ModerationActionInput!): ModerationFlag!

  """Create a category."""
  createCategory(category: CategoryInput!): Category!

  """Update a category."""
  updateCategory(id: ID!, category: CategoryInput!): Category!

  """Delete a category."""
  deleteCategory(id: ID!): Boolean!

  """Create a user."""
  createUser(user: KalturaUserInput!): KalturaUser!

  """Update a user."""
  updateUser(id: ID!, user: KalturaUserInput!): KalturaUser!

  """Delete a user."""
  deleteUser(id: ID!): Boolean!

  """Block a user."""
  blockUser(id: ID!): KalturaUser!

  """Unblock a user."""
  unblockUser(id: ID!): KalturaUser!

  """Create a playlist."""
  createPlaylist(playlist: PlaylistInput!): Playlist!

  """Update a playlist."""
  updatePlaylist(id: ID!, playlist: PlaylistInput!): Playlist!

  """Delete a playlist."""
  deletePlaylist(id: ID!): Boolean!

  """Create a live stream entry."""
  createLiveStreamEntry(entry: LiveStreamEntryInput!): LiveStreamEntry!

  """Update a live stream entry."""
  updateLiveStreamEntry(id: ID!, entry: LiveStreamEntryInput!): LiveStreamEntry!

  """Delete a live stream entry."""
  deleteLiveStreamEntry(id: ID!): Boolean!

  """Add a cue point to a media entry."""
  addCuePoint(cuePoint: CuePointInput!): CuePoint!

  """Update a cue point."""
  updateCuePoint(id: ID!, cuePoint: CuePointInput!): CuePoint!

  """Delete a cue point."""
  deleteCuePoint(id: ID!): Boolean!

  """Trigger a bulk upload."""
  bulkUploadEntries(file: Upload!, bulkUploadType: String): BulkUpload!

  """Abort a batch job."""
  abortBatchJob(id: ID!): BatchJob!
}

type Subscription {
  """Subscribe to live stream status changes."""
  liveStreamStatusChanged(entryId: ID!): LiveStreamEntry!

  """Subscribe to media entry status changes."""
  mediaEntryStatusChanged(entryId: ID!): MediaEntry!

  """Subscribe to batch job completion."""
  batchJobCompleted(jobType: String): BatchJob!

  """Subscribe to new moderation flags."""
  newModerationFlag(partnerId: Int): ModerationFlag!
}
