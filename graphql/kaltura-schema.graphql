  createdAtLessThanOrEqual: DateTime
  updatedAtGreaterThanOrEqual: DateTime
  updatedAtLessThanOrEqual: DateTime
  userIdEqual: String
  userIdIn: String
  freeText: String
  referenceIdEqual: String
  orderBy: String
}

